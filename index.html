<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Hogwarts - Yoselin</title>
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        #contenedor {
            position: relative;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        /* SOBRE */
        #seccion-sobre {
            cursor: pointer;
            transition: all 0.8s ease;
        }

        #sobre-img {
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 10px;
        }

        .instruccion {
            color: #d4af37;
            margin-top: 15px;
            font-size: 14px;
            letter-spacing: 2px;
            animation: parpadeo 2s infinite;
        }

        /* CARTA */
        #seccion-carta {
            display: none;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s ease;
        }

        #invitacion-img {
            width: 100%;
            border: 2px solid #d4af37;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .boton-ws {
            display: inline-block;
            background: #740001; /* Rojo Gryffindor */
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
            border: 2px solid #d4af37;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptoken=5792d472-8877-49f9-968b-57774e1d702d" type="audio/mpeg">
    </audio>

    <div id="contenedor">
        <div id="seccion-sobre" onclick="abrirCarta()">
            <img src="sobre.jpg" id="sobre-img" alt="Sobre con sello rojo">
            <p class="instruccion">PULSA EL SELLO PARA ABRIR</p>
        </div>

        <div id="seccion-carta">
            <img src="invitacion.png" id="invitacion-img" alt="Invitación Yoselin">
            <br>
            <a id="linkWs" href="#" class="boton-ws">CONFIRMAR ASISTENCIA ⚡</a>
        </div>
    </div>

    <script>
        function abrirCarta() {
            // Activar música
            const audio = document.getElementById('musica');
            audio.play().catch(e => console.log("Audio esperando interacción"));

            // Desvanecer sobre
            const sobre = document.getElementById('seccion-sobre');
            sobre.style.opacity = "0";
            sobre.style.transform = "scale(1.2) translateY(-50px)";

            setTimeout(() => {
                sobre.style.display = "none";
                
                // Mostrar invitación
                const carta = document.getElementById('seccion-carta');
                carta.style.display = "block";
                
                setTimeout(() => {
                    carta.style.opacity = "1";
                    carta.style.transform = "scale(1)";
                }, 50);
            }, 800);
        }

        // CONFIGURACIÓN WHATSAPP MÉXICO
        const miNumero = "527351817365"; 
        const mensaje = "¡Hola! Confirmo mi asistencia al cumple de Yoselin. ¡Ahí estaré! 🧙‍♂️✨";
        document.getElementById('linkWs').href = "https://api.whatsapp.com/send?phone=" + miNumero + "&text=" + encodeURIComponent(mensaje);
    </script>

</body>
</html>
