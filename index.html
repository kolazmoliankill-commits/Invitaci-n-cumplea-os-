<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Mágica - Yoselin</title>
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        #contenedor {
            position: relative;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        /* ESTILO DEL SOBRE */
        #sobre {
            width: 100%;
            cursor: pointer;
            transition: transform 0.8s, opacity 0.8s;
            z-index: 2;
        }

        /* ESTILO DE LA CARTA (OCULTA AL INICIO) */
        #carta {
            width: 100%;
            display: none;
            opacity: 0;
            transition: opacity 1s;
            transform: scale(0.9);
            z-index: 1;
        }

        .instruccion {
            color: white;
            margin-top: 10px;
            font-size: 14px;
            letter-spacing: 2px;
            animation: parpadeo 2s infinite;
        }

        @keyframes parpadeo {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .boton-ws {
            display: none;
            background: #740001;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
            border: 2px solid #d4af37;
        }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptoken=5792d472-8877-49f9-968b-57774e1d702d" type="audio/mpeg">
    </audio>

    <div id="contenedor">
        <div id="seccion-sobre" onclick="abrirCarta()">
            <img src="sobre.jpg" id="sobre" alt="Sobre de Hogwarts">
            <p class="instruccion">TOCA EL SELLO PARA ABRIR</p>
        </div>

        <div id="seccion-carta">
            <img src="invitacion.png" id="carta" alt="Invitación Yoselin">
            <br>
            <a id="linkWs" href="#" class="boton-ws">CONFIRMAR ASISTENCIA ⚡</a>
        </div>
    </div>

    <script>
        function abrirCarta() {
            // Reproducir música
            document.getElementById('musica').play();

            // Animación de salida del sobre
            const sobre = document.getElementById('sobre');
            const instruccion = document.querySelector('.instruccion');
            sobre.style.transform = "translateY(-100px) scale(1.2)";
            sobre.style.opacity = "0";
            instruccion.style.display = "none";

            setTimeout(() => {
                document.getElementById('seccion-sobre').style.display = "none";
                
                // Mostrar la carta de Yoselin
                const carta = document.getElementById('carta');
                const boton = document.querySelector('.boton-ws');
                carta.style.display = "block";
                boton.style.display = "inline-block";
                
                setTimeout(() => {
                    carta.style.opacity = "1";
                    carta.style.transform = "scale(1)";
                }, 100);
            }, 800);
        }

        // CONFIGURACIÓN DE WHATSAPP
        const miNumero = "573XXXXXXXXX"; // PON TU NÚMERO AQUÍ
        const mensaje = "¡Hola Yoselin! Confirmo mi asistencia a tu cumple. ¡Gracias por la invitación! 🧙‍♂️✨";
        document.getElementById('linkWs').href = "https://api.whatsapp.com/send?phone=" + miNumero + "&text=" + encodeURIComponent(mensaje);
    </script>
</body>
</html>
