<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Mágica</title>
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        /* EFECTO DE LUZ (FLASH) */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
        }

        #contenedor {
            position: relative;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        /* SOBRE */
        #seccion-sobre {
            cursor: pointer;
            transition: all 0.6s ease-in;
        }

        #sobre-img {
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 10px;
        }

        /* CARTA */
        #seccion-carta {
            display: none;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #invitacion-img {
            width: 100%;
            border: 2px solid #d4af37;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
        }

        .boton-ws {
            display: inline-block;
            background: #740001;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
            border: 2px solid #d4af37;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* ANIMACIÓN DE LUZ */
        .luz-activa {
            animation: destello 0.8s parseFloat;
        }

        @keyframes destello {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .instruccion { color: #d4af37; margin-top: 15px; animation: parpadeo 2s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="flash"></div>

    <audio id="musica" loop>
        <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptoken=5792d472-8877-49f9-968b-57774e1d702d" type="audio/mpeg">
    </audio>

    <div id="contenedor">
        <div id="seccion-sobre" onclick="abrirCarta()">
            <img src="sobre.jpg" id="sobre-img">
            <p class="instruccion">PULSA EL SELLO PARA ABRIR</p>
        </div>

        <div id="seccion-carta">
            <img src="invitacion.png" id="invitacion-img">
            <br>
            <a id="linkWs" href="#" class="boton-ws">CONFIRMAR ASISTENCIA ⚡</a>
        </div>
    </div>

    <script>
        function abrirCarta() {
            // 1. Sonido
            document.getElementById('musica').play();

            // 2. Efecto de Luz (Flash)
            const flash = document.getElementById('flash');
            flash.classList.add('luz-activa');

            // 3. Transición de imágenes
            const sobre = document.getElementById('seccion-sobre');
            const carta = document.getElementById('seccion-carta');

            setTimeout(() => {
                sobre.style.display = "none";
                carta.style.display = "block";
                
                setTimeout(() => {
                    carta.style.opacity = "1";
                    carta.style.transform = "scale(1)";
                }, 50);
            }, 400); // El cambio ocurre justo en el pico de la luz
        }

        // EL LINK DE WHATSAPP (SIN ERRORES)
        // El número debe ir pegado: Código país (52) + número (7351817365)
        const miNumero = "527351817365"; 
        const mensaje = "¡Hola! Confirmo mi asistencia al cumple de Yoselin. ¡Ahí estaré! 🧙‍♂️✨";
        
        // Esta es la forma más segura para que WhatsApp lo reconozca
        document.getElementById('linkWs').href = "https://wa.me/" + miNumero + "?text=" + encodeURIComponent(mensaje);
    </script>

</body>
</html>
